  <!-- Ground reflection -->
  <rect x="0" y="520" width="800" height="80" fill="#c9a96e" opacity="0.02"/>
  <!-- Neon signs -->
  <rect x="310" y="240" width="30" height="3" fill="#c9a96e" opacity="0.8" filter="url(#bloom)"/>
  <rect x="450" y="230" width="25" height="3" fill="#c9a96e" opacity="0.7" filter="url(#bloom)"/>
  <!-- Moon -->
  <circle cx="650" cy="80" r="20" fill="#c9a96e" opacity="0.15"/>
  <circle cx="650" cy="80" r="15" fill="#c9a96e" opacity="0.08" filter="url(#bigBloom)"/>
  <!-- Stars -->
  <circle cx="100" cy="50" r="1" fill="#c9a96e" opacity="0.3"/>
  <circle cx="300" cy="30" r="0.8" fill="#c9a96e" opacity="0.25"/>
