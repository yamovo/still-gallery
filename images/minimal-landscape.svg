<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="mist" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#080808"/>
      <stop offset="50%" stop-color="#0c0c0c"/>
      <stop offset="100%" stop-color="#080808"/>
    </linearGradient>
    <filter id="landscapeBlur"><feGaussianBlur stdDeviation="8"/></filter>
  </defs>
  <rect width="800" height="600" fill="#080808"/>
  <!-- Far mountains -->
  <path d="M0,350 Q100,280 200,320 Q300,250 400,300 Q500,240 600,290 Q700,260 800,310 L800,400 L0,400 Z" fill="#c9a96e" opacity="0.04" filter="url(#landscapeBlur)"/>
  <!-- Mid mountains -->
  <path d="M0,380 Q150,320 250,360 Q350,300 450,340 Q550,310 650,350 Q750,330 800,360 L800,450 L0,450 Z" fill="#c9a96e" opacity="0.06"/>
  <!-- Near hills -->
  <path d="M0,420 Q100,390 200,410 Q300,380 400,400 Q500,370 600,395 Q700,380 800,410 L800,500 L0,500 Z" fill="#c9a96e" opacity="0.08"/>
  <!-- Water / ground -->
  <rect x="0" y="450" width="800" height="150" fill="#c9a96e" opacity="0.02"/>
  <!-- Reflection lines on water -->
  <line x1="200" y1="470" x2="350" y2="470" stroke="#c9a96e" stroke-opacity="0.06" stroke-width="0.5"/>
  <line x1="400" y1="480" x2="520" y2="480" stroke="#c9a96e" stroke-opacity="0.05" stroke-width="0.5"/>
  <line x1="300" y1="495" x2="480" y2="495" stroke="#c9a96e" stroke-opacity="0.04" stroke-width="0.5"/>
  <line x1="150" y1="510" x2="380" y2="510" stroke="#c9a96e" stroke-opacity="0.03" stroke-width="0.5"/>
  <!-- Moon -->
  <circle cx="600" cy="120" r="30" fill="#c9a96e" opacity="0.08"/>
  <circle cx="600" cy="120" r="20" fill="#c9a96e" opacity="0.05"/>
  <!-- Moon reflection on water -->
  <line x1="590" y1="450" x2="610" y2="450" stroke="#c9a96e" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="585" y1="460" x2="615" y2="460" stroke="#c9a96e" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="580" y1="470" x2="620" y2="470" stroke="#c9a96e" stroke-opacity="0.03" stroke-width="1"/>
  <!-- Single tree silhouette -->
  <line x1="200" y1="420" x2="200" y2="360" stroke="#c9a96e" stroke-opacity="0.1" stroke-width="2"/>
  <circle cx="200" cy="345" r="18" fill="none" stroke="#c9a96e" stroke-opacity="0.08" stroke-width="1"/>
  <circle cx="200" cy="345" r="12" fill="#c9a96e" opacity="0.03"/>
  <!-- Mist layers -->
  <rect x="0" y="340" width="800" height="60" fill="url(#mist)" opacity="0.3"/>
  <rect x="0" y="400" width="800" height="40" fill="url(#mist)" opacity="0.2"/>
</svg>
