<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="wetGround" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#050505"/>
    </linearGradient>
    <filter id="neonGlow"><feGaussianBlur stdDeviation="6"/></filter>
    <filter id="neonSoft"><feGaussianBlur stdDeviation="2"/></filter>
  </defs>
  <rect width="800" height="600" fill="#050508"/>
  <!-- Wet ground -->
  <rect x="0" y="350" width="800" height="250" fill="url(#wetGround)"/>
  <!-- Horizon line -->
  <line x1="0" y1="350" x2="800" y2="350" stroke="#c9a96e" stroke-opacity="0.1" stroke-width="0.5"/>
  <!-- Neon sign 1 - left -->
  <rect x="120" y="180" width="120" height="6" fill="#c9a96e" opacity="0.8" filter="url(#neonGlow)"/>
  <rect x="120" y="180" width="120" height="6" fill="#c9a96e" opacity="0.9"/>
  <rect x="120" y="200" width="80" height="4" fill="#c9a96e" opacity="0.5" filter="url(#neonGlow)"/>
  <rect x="120" y="200" width="80" height="4" fill="#c9a96e" opacity="0.6"/>
  <!-- Neon sign 1 reflection -->
  <rect x="120" y="370" width="120" height="4" fill="#c9a96e" opacity="0.15" filter="url(#neonSoft)"/>
  <rect x="130" y="390" width="100" height="3" fill="#c9a96e" opacity="0.1" filter="url(#neonSoft)"/>
  <rect x="140" y="410" width="80" height="2" fill="#c9a96e" opacity="0.07" filter="url(#neonSoft)"/>
  <!-- Neon sign 2 - right -->
  <rect x="550" y="150" width="4" height="100" fill="#c9a96e" opacity="0.7" filter="url(#neonGlow)"/>
  <rect x="550" y="150" width="4" height="100" fill="#c9a96e" opacity="0.8"/>
  <rect x="570" y="160" width="4" height="80" fill="#c9a96e" opacity="0.5" filter="url(#neonGlow)"/>
  <rect x="570" y="160" width="4" height="80" fill="#c9a96e" opacity="0.6"/>
  <!-- Neon sign 2 reflection -->
  <rect x="550" y="370" width="3" height="60" fill="#c9a96e" opacity="0.12" filter="url(#neonSoft)"/>
  <rect x="560" y="400" width="2" height="40" fill="#c9a96e" opacity="0.08" filter="url(#neonSoft)"/>
  <!-- Neon circle sign - center -->
  <circle cx="400" cy="200" r="40" fill="none" stroke="#c9a96e" stroke-opacity="0.6" stroke-width="3" filter="url(#neonGlow)"/>
  <circle cx="400" cy="200" r="40" fill="none" stroke="#c9a96e" stroke-opacity="0.7" stroke-width="3"/>
  <circle cx="400" cy="200" r="28" fill="none" stroke="#c9a96e" stroke-opacity="0.3" stroke-width="1.5"/>
  <!-- Circle reflection -->
  <ellipse cx="400" cy="380" rx="35" ry="6" fill="#c9a96e" opacity="0.1" filter="url(#neonSoft)"/>
  <ellipse cx="400" cy="410" rx="25" ry="4" fill="#c9a96e" opacity="0.06" filter="url(#neonSoft)"/>
  <!-- Rain streaks -->
  <line x1="200" y1="100" x2="195" y2="350" stroke="#c9a96e" stroke-opacity="0.03" stroke-width="0.5"/>
  <line x1="350" y1="50" x2="345" y2="350" stroke="#c9a96e" stroke-opacity="0.025" stroke-width="0.5"/>
  <line x1="500" y1="80" x2="495" y2="350" stroke="#c9a96e" stroke-opacity="0.03" stroke-width="0.5"/>
  <line x1="650" y1="120" x2="645" y2="350" stroke="#c9a96e" stroke-opacity="0.02" stroke-width="0.5"/>
  <!-- Puddle reflections -->
  <ellipse cx="300" cy="450" rx="80" ry="8" fill="#c9a96e" opacity="0.02"/>
  <ellipse cx="550" cy="480" rx="60" ry="6" fill="#c9a96e" opacity="0.015"/>
  <!-- Ambient glow on ground -->
  <rect x="0" y="340" width="800" height="20" fill="#c9a96e" opacity="0.02"/>
</svg>
