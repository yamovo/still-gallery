<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c9a96e" stop-opacity="0.8"/>
      <stop offset="40%" stop-color="#c9a96e" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#080808" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.9"/>
      <stop offset="30%" stop-color="#c9a96e" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#c9a96e" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="8"/></filter>
    <filter id="blur2"><feGaussianBlur stdDeviation="20"/></filter>
  </defs>
  <rect width="800" height="600" fill="#080808"/>
  <!-- Lens flare rings -->
  <circle cx="400" cy="300" r="200" fill="none" stroke="#c9a96e" stroke-opacity="0.08" stroke-width="1"/>
  <circle cx="400" cy="300" r="160" fill="none" stroke="#c9a96e" stroke-opacity="0.12" stroke-width="0.8"/>
  <circle cx="400" cy="300" r="120" fill="none" stroke="#c9a96e" stroke-opacity="0.15" stroke-width="0.6"/>
  <circle cx="400" cy="300" r="80" fill="none" stroke="#c9a96e" stroke-opacity="0.2" stroke-width="0.5"/>
  <!-- Diagonal flare lines -->
  <line x1="200" y1="100" x2="600" y2="500" stroke="#c9a96e" stroke-opacity="0.06" stroke-width="40" filter="url(#blur2)"/>
  <line x1="600" y1="100" x2="200" y2="500" stroke="#c9a96e" stroke-opacity="0.04" stroke-width="30" filter="url(#blur2)"/>
  <!-- Hexagonal lens element -->
  <polygon points="400,180 504,240 504,360 400,420 296,360 296,240" fill="none" stroke="#c9a96e" stroke-opacity="0.15" stroke-width="1"/>
  <polygon points="400,210 484,255 484,345 400,390 316,345 316,255" fill="none" stroke="#c9a96e" stroke-opacity="0.1" stroke-width="0.8"/>
  <!-- Light spots along diagonal -->
  <circle cx="280" cy="180" r="15" fill="url(#core)" filter="url(#blur1)" opacity="0.6"/>
  <circle cx="520" cy="420" r="12" fill="url(#core)" filter="url(#blur1)" opacity="0.5"/>
  <circle cx="350" cy="250" r="8" fill="#c9a96e" opacity="0.3" filter="url(#blur1)"/>
  <circle cx="480" cy="360" r="6" fill="#c9a96e" opacity="0.25" filter="url(#blur1)"/>
  <!-- Center glow -->
  <circle cx="400" cy="300" r="100" fill="url(#glow)"/>
  <circle cx="400" cy="300" r="30" fill="url(#core)"/>
  <!-- Aperture blades hint -->
  <path d="M400,200 L430,250 L430,350 L400,400 L370,350 L370,250 Z" fill="none" stroke="#c9a96e" stroke-opacity="0.08" stroke-width="0.5"/>
  <!-- Floating particles -->
  <circle cx="150" cy="150" r="1.5" fill="#c9a96e" opacity="0.4"/>
  <circle cx="650" cy="200" r="1" fill="#c9a96e" opacity="0.3"/>
  <circle cx="100" cy="450" r="1.2" fill="#c9a96e" opacity="0.35"/>
  <circle cx="700" cy="400" r="1.8" fill="#c9a96e" opacity="0.25"/>
  <circle cx="300" cy="500" r="1" fill="#c9a96e" opacity="0.3"/>
</svg>
