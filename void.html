<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STILL - Visual Archive</title>
  <meta name="description" content="A curated collection of still images and writing. Photography, design, and visual culture.">
  <meta property="og:title" content="STILL - Visual Archive">
  <meta property="og:description" content="A curated collection of still images and writing.">
  <meta property="og:type" content="website">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <script src="js/anime.umd.min.js"></script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="no-js">
  <script>document.body.classList.remove('no-js');</script>

  <canvas id="particles" style="position:fixed;inset:0;z-index:0;pointer-events:none;"></canvas>

  <div class="scroll-progress" id="scrollProgress"></div>
  <div class="cursor-glow" id="cursorGlow"></div>

  <div class="loader" id="loader">
    <div class="loader-text" id="loaderText"></div>
    <div class="loader-bar"><div class="loader-bar-fill" id="loaderFill"></div></div>
  </div>

  <nav class="nav">
    <a href="/" class="nav-logo" style="text-decoration:none;color:inherit;">STILL</a>
    <div class="nav-links">
      <a class="nav-link magnetic" href="#work">Gallery</a>
      <a class="nav-link magnetic" href="/void-blog">Writing</a>
      <a class="nav-link magnetic void-back" href="/" style="color:var(--gold);border:1px solid rgba(201,169,110,0.3);padding:4px 12px;border-radius:2px;">&larr; Back</a>
    </div>
  </nav>

  <section class="hero">
    <div class="hero-bg"></div>
    <div class="hero-grid"></div>
    <canvas class="hero-canvas" id="heroCanvas"></canvas>
    <div class="hero-content">
      <p class="hero-eyebrow">Visual Archive - Est. 2026</p>
      <h1 id="heroTitle">Captured<br><em>Moments</em></h1>
      <p class="hero-sub">A curated collection of still images</p>
    </div>
    <div class="cube-wrap">
      <div class="cube" id="cube">
        <div class="cube-face"></div><div class="cube-face"></div>
        <div class="cube-face"></div><div class="cube-face"></div>
        <div class="cube-face"></div><div class="cube-face"></div>
      </div>
    </div>
    <div class="hero-scroll">
      <span>Scroll</span>
      <div class="scroll-mouse"></div>
    </div>
  </section>

  <div class="marquee">
    <div class="marquee-inner" id="marqueeInner"></div>
  </div>

  <section class="featured" id="featured"></section>

  <section class="h-section" id="writing">
    <div class="h-header">
      <h2>Recent <em>Writing</em></h2>
      <a href="/void-blog" class="h-more magnetic">View All &rarr;</a>
    </div>
    <div class="h-track" id="writingTrack"></div>
  </section>

  <section class="h-section" id="work">
    <div class="h-header">
      <h2>Recent <em>Archive</em></h2>
      <span class="h-count" id="hCount"></span>
    </div>
    <div class="h-track" id="hTrack"></div>
  </section>

  <section class="float3d-section" id="float3d"></section>

  <section class="masonry-section" id="archive">
    <div class="masonry-title">Full <em>Collection</em></div>
    <div class="filter-bar" id="filterBar"></div>
    <div class="masonry" id="masonry"></div>
  </section>

  <footer>
    <span>&copy; 2026 STILL</span>
    <span>Built with Passion</span>
  </footer>

  <div class="lightbox" id="lightbox">
    <button class="lb-close magnetic" aria-label="Close">&#10005;</button>
    <button class="lb-nav lb-prev magnetic" aria-label="Previous image">&#8249;</button>
    <img class="lb-img" id="lbImg" src="" alt="">
    <button class="lb-nav lb-next magnetic" aria-label="Next image">&#8250;</button>
    <div class="lb-info">
      <div class="lb-title" id="lbTitle"></div>
      <div class="lb-counter" id="lbCounter"></div>
    </div>
    <button class="lb-mute magnetic" id="lbMute">
      <svg class="lb-mute-icon" id="lbMuteIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07" id="lbMuteWaves"/></svg>
    </button>
    <audio id="lbAudio" loop preload="auto"></audio>
  </div>

  <script src="js/particles.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/gallery.js"></script>
</body>
</html>
