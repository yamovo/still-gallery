<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - STILL</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/animejs@4.4.1/dist/bundles/anime.umd.min.js"></script>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .not-found { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 40px; }
    .not-found-code { font-family: var(--serif); font-size: clamp(80px, 15vw, 160px); font-weight: 400; color: var(--gold); line-height: 1; opacity: 0; }
    .not-found-title { font-family: var(--serif); font-size: clamp(20px, 3vw, 32px); font-weight: 400; color: var(--text); margin-top: 16px; opacity: 0; }
    .not-found-sub { font-size: 13px; color: var(--muted); margin-top: 12px; letter-spacing: 1px; opacity: 0; }
    .not-found-link { display: inline-block; margin-top: 36px; font-size: 12px; letter-spacing: 4px; text-transform: uppercase; color: var(--gold); text-decoration: none; border: 1px solid rgba(201,169,110,0.25); padding: 14px 36px; border-radius: 6px; transition: all 0.4s ease; opacity: 0; }
    .not-found-link:hover { background: rgba(201,169,110,0.08); border-color: rgba(201,169,110,0.5); }
    .not-found-line { width: 40px; height: 1px; background: rgba(201,169,110,0.2); margin: 28px auto 0; opacity: 0; }
  </style>
</head>
<body>

  <canvas id="particles" style="position:fixed;inset:0;z-index:0;pointer-events:none;"></canvas>

  <nav class="nav">
    <a href="/" class="nav-logo" style="text-decoration:none;color:inherit;">STILL</a>
    <div class="nav-links">
      <a class="nav-link magnetic" href="/">Gallery</a>
      <a class="nav-link magnetic" href="/blog">Writing</a>
    </div>
  </nav>

  <section class="not-found">
    <div class="not-found-code" id="code404">404</div>
    <div class="not-found-title">Page Not Found</div>
    <div class="not-found-sub">The page you are looking for does not exist.</div>
    <div class="not-found-line"></div>
    <a href="/" class="not-found-link magnetic" id="backHome">Back to Home</a>
  </section>

  <script src="js/particles.js"></script>
  <script>
    // Simple entrance animation
    anime.animate('.not-found-code', { opacity: [0, 1], translateY: [30, 0], duration: 800, ease: 'outCubic' });
    anime.animate('.not-found-title', { opacity: [0, 1], translateY: [20, 0], duration: 700, delay: 200, ease: 'outCubic' });
    anime.animate('.not-found-sub', { opacity: [0, 1], translateY: [15, 0], duration: 600, delay: 350, ease: 'outCubic' });
    anime.animate('.not-found-line', { opacity: [0, 1], scaleX: [0, 1], duration: 500, delay: 500, ease: 'outCubic' });
    anime.animate('.not-found-link', { opacity: [0, 1], translateY: [15, 0], duration: 600, delay: 600, ease: 'outCubic' });
  </script>
</body>
</html>
